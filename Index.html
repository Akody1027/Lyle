<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Wife Cam Debug</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #camera-canvas { width: 100vw; height: 100vh; object-fit: cover; display: none; position: fixed; top: 0; }
        #debug-log { position: fixed; top: 10px; width: 90%; background: rgba(255,0,0,0.8); padding: 10px; font-size: 12px; border-radius: 5px; display: none; z-index: 1000; word-break: break-all; }
        #start-btn { padding: 20px 40px; background: #FFFC00; color: #000; border: none; border-radius: 40px; font-weight: bold; font-size: 18px; z-index: 100; }
    </style>
</head>
<body>

    <div id="debug-log"></div>

    <button id="start-btn">TAP TO START</button>
    <p id="status" style="margin-top: 20px; opacity: 0.5;">Ready to initialize...</p>

    <canvas id="camera-canvas"></canvas>

    <script type="module">
        import { bootstrapCameraKit, createUserMediaSource } from "https://cdn.jsdelivr.net/npm/@snap/camera-kit/dist/index.js";

        // VERIFY: This must be your PRODUCTION token
        const apiToken = "EyJhbGciOiJIUzI1NiIsImtpZCI6IkNhbnZhc1MyU0hNQUNQcm9kIiwidHlwIjoiSldUIn0.eyJhdWQiOiJjYW52YXMtY2FudmFzYXBpIiwiaXNzIjoiY2FudmFzLXMyc3Rva2VuIiwibmJmIjoxNzc2MTA2MjExLCJzdWIiOiJmNGMwMjdhYy01ZDk4LTQyYjktOWJlYy0wOTk0YTNjYmViYzR-UFJPRFVDVElPTn4xYTIxOTQwNy1lZmMyLTRmMTktOTAzOS1iNTE2YWE2ZDhkOTYifQ.AC0l5OekHY3FF8tmh1fEcDBPZL-wX_GCIGUO4LtrUIY";
        const lensGroupId = "e7a59f58-6be3-4076-b7e4-c2bfb3567e1b";

        const log = document.getElementById('debug-log');
        const status = document.getElementById('status');
        const btn = document.getElementById('start-btn');

        function showError(msg) {
            log.style.display = 'block';
            log.innerText = "ERROR: " + msg;
        }

        btn.onclick = async () => {
            status.innerText = "Bootstrapping...";
            try {
                // 1. Initialize SDK
                const cameraKit = await bootstrapCameraKit({ apiToken }).catch(e => { throw new Error("SDK Bootstrap Failed: " + e.message) });
                
                // 2. Create Session
                const liveCanvas = document.getElementById("camera-canvas");
                const session = await cameraKit.createSession({ liveCanvas });
                status.innerText = "Session Created. Accessing Camera...";

                // 3. Get Camera
                const source = await createUserMediaSource({ video: { facingMode: "user" } }).catch(e => { throw new Error("Camera Access Denied: " + e.message) });
                await session.setSource(source);
                session.play();
                
                // 4. Load Lenses
                status.innerText = "Loading Lens Group...";
                const response = await cameraKit.lensRepository.loadLensGroups([lensGroupId]).catch(e => { throw new Error("Lens Group Failed: " + e.message) });
                
                if (response[0].lenses.length > 0) {
                    await session.applyLens(response[0].lenses[0]);
                    btn.style.display = 'none';
                    status.style.display = 'none';
                    liveCanvas.style.display = 'block';
                } else {
                    showError("No lenses found in this group.");
                }

            } catch (err) {
                showError(err.message);
                console.error(err);
            }
        };
    </script>
</body>
</html>
