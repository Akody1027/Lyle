<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Wife Cam Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        #camera-canvas { width: 100vw; height: 100vh; object-fit: cover; display: none; }
        
        /* The Welcome/Start Button */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 100;
        }
        #start-btn {
            padding: 20px 40px; background: #FFFC00; color: #000;
            border: none; border-radius: 40px; font-weight: bold; font-size: 18px; cursor: pointer;
        }

        .ui-container { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; display: none; }
        .lens-row { display: flex; overflow-x: auto; width: 100%; padding: 10px 20px; gap: 15px; scrollbar-width: none; }
        .lens-btn { min-width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 20px;">Personal Filter App</h2>
        <button id="start-btn">TAP TO START CAMERA</button>
        <p id="status" style="margin-top: 20px; opacity: 0.6; font-size: 12px;">Waiting for user...</p>
    </div>

    <canvas id="camera-canvas"></canvas>

    <div class="ui-container" id="ui-bar">
        <div class="lens-row" id="lens-menu"></div>
        <p style="opacity: 0.5; margin-top: 15px; font-size: 12px;">SWIPE FOR FILTERS</p>
    </div>

    <script type="module">
        import { bootstrapCameraKit, createUserMediaSource } from "https://cdn.jsdelivr.net/npm/@snap/camera-kit/dist/index.js";

        // Your Production Token
        const apiToken = "EyJhbGciOiJIUzI1NiIsImtpZCI6IkNhbnZhc1MyU0hNQUNQcm9kIiwidHlwIjoiSldUIn0.eyJhdWQiOiJjYW52YXMtY2FudmFzYXBpIiwiaXNzIjoiY2FudmFzLXMyc3Rva2VuIiwibmJmIjoxNzc2MTA2MjExLCJzdWIiOiJmNGMwMjdhYy01ZDk4LTQyYjktOWJlYy0wOTk0YTNjYmViYzR-UFJPRFVDVElPTn4xYTIxOTQwNy1lZmMyLTRmMTktOTAzOS1iNTE2YWE2ZDhkOTYifQ.AC0l5OekHY3FF8tmh1fEcDBPZL-wX_GCIGUO4LtrUIY";
        const lensGroupId = "e7a59f58-6be3-4076-b7e4-c2bfb3567e1b";

        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        startBtn.onclick = async () => {
            statusText.innerText = "Initializing Engine...";
            startBtn.style.display = 'none';

            try {
                // 1. Bootstrap
                const cameraKit = await bootstrapCameraKit({ apiToken });
                const liveCanvas = document.getElementById("camera-canvas");
                const session = await cameraKit.createSession({ liveCanvas });

                // 2. Camera Source
                statusText.innerText = "Requesting Camera...";
                const source = await createUserMediaSource({ video: { facingMode: "user" } });
                await session.setSource(source);
                session.play();

                // 3. Load Lenses
                statusText.innerText = "Fetching Lenses...";
                const response = await cameraKit.lensRepository.loadLensGroups([lensGroupId]);
                const lenses = response[0].lenses;

                const menu = document.getElementById("lens-menu");
                lenses.forEach(lens => {
                    const btn = document.createElement("div");
                    btn.className = "lens-btn";
                    btn.innerText = lens.name || "Filter";
                    btn.onclick = () => session.applyLens(lens);
                    menu.appendChild(btn);
                });

                // Auto-apply first lens
                if (lenses.length > 0) await session.applyLens(lenses[0]);

                // Final Reveal
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('camera-canvas').style.display = 'block';
                document.getElementById('ui-bar').style.display = 'flex';

            } catch (err) {
                console.error(err);
                statusText.innerText = "Error: " + err.message;
                statusText.style.color = "red";
                alert("Make sure you are viewing this via HTTPS and your domain is whitelisted.");
            }
        };
    </script>
</body>
</html>
